
services:
###> doctrine/doctrine-bundle ###
  database:
    image: postgis/postgis:${POSTGRES_VERSION:-16}-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # Авто-включение расширения postgis при первом старте базы:
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
    networks:
      - hevii
###< doctrine/doctrine-bundle ###
  php:
    build:
      dockerfile: ./Dockerfile
      ssh:
        - default
    volumes:
      # Монтируем весь проект для живой разработки
      - ./:/var/www/app:cached
      # НО исключаем var/cache - он будет жить в контейнере для быстрой работы
      - php_cache:/var/www/app/var/cache
      # Также исключаем var/log для чистых логов
      - php_logs:/var/www/app/var/log
      # PHP upload limits override (no image rebuild needed)
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    ports:
      - "9020:9000"
    environment:
      # Убеждаемся что APP_DEBUG=1 для автоинвалидации кеша
      DATABASE_URL: "postgresql://app:!ChangeMe!@database:5432/app?serverVersion=16&charset=utf8"
      APP_DEBUG: 1
      APP_SECRET: ${APP_SECRET}
    networks:
      - hevii
      - shared-network

  nginx:
    image: nginx:stable
    depends_on:
      - php
    ports:
      - "8090:80"
    volumes:
      - ./:/var/www/app
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - hevii

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
  # Volumes для кеша и логов PHP - хранятся в контейнере для быстрой работы
  php_cache:
  php_logs:

networks:
  shared-network:
    external: true
  hevii:
    driver: bridge
