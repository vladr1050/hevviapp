server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/app/public;

    # Docker встроенный DNS — резолвим php при запросе, а не при старте nginx.
    # Иначе при `docker compose restart php nginx` nginx часто стартует раньше php
    # и падает с: host not found in upstream "php".
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Allow up to 30 MB for file uploads (PDF attachments).
    # Must be >= PHP post_max_size (30M).
    client_max_body_size 30m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Переменная обязательна: иначе nginx резолвит php только при чтении конфига.
        set $php_upstream php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        # Buffer sizes for large multipart uploads.
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}