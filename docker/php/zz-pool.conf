; PHP-FPM pool tuning for production (mounted via compose.prod.yaml).
; Loads after the image default www.conf (alphabetical: www -> zz-pool),
; so directives here override the stock pm.* defaults (max_children=5).
;
; Why this file exists: after an OOM / hard reset all 5 default workers got
; stuck; new requests queued behind them and the site hung (nginx waited up
; to fastcgi_read_timeout=600s). See docs/deployment/RESILIENCE.md.

[www]

; --- Worker pool sizing (host has ~4 GB RAM) ---
; Rough budget: each worker ~40-60 MB resident -> 10 workers ~0.5-0.6 GB.
pm = dynamic
pm.max_children = 10
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5

; --- Self-healing knobs (directly prevent the incident) ---
; Recycle a worker after N requests: frees leaked memory and clears any
; worker that drifted into a bad state.
pm.max_requests = 500

; Kill a single request that runs longer than this. Without it a hung
; request can pin a worker forever; with all workers pinned the pool stops
; answering. 120s is well above normal page/PDF render time but far below
; nginx fastcgi_read_timeout (600s), so FPM recovers before nginx gives up.
request_terminate_timeout = 120s

; --- Observability (handy when debugging a future hang) ---
; Not wired to nginx by default; reachable from inside the container with an
; FCGI client, e.g. cgi-fcgi. Harmless if unused.
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong
