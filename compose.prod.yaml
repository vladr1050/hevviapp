# Override for production: APP_DEBUG=0, env from .env
services:
  php:
    environment:
      APP_DEBUG: "0"
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      # Подхватывается из .env на сервере при docker compose; иначе пусто (Sentry выключен).
      SENTRY_DSN: ${SENTRY_DSN:-}
