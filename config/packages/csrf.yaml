# Enable stateless CSRF protection for forms and logins/logouts
framework:
    form:
        csrf_protection:
            token_id: submit

    csrf_protection:
        stateless_token_ids:
            - submit
            - authenticate
            - logout
            # JWT + stateless main firewall: без этого CSRF жил в session и ломался на POST (Invalid CSRF token).
            - confirm_order
            - cancel_order
            - update_order_status
