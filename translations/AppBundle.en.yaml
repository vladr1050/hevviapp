# Email notifications
email:
    order_status:
        header:          Order Status Update
        greeting:        Hello, %name%!
        order_details:   Order details
        order_id:        Order ID
        pickup_address:  Pickup Address
        dropout_address: Dropout Address
        notes:           Notes
        footer:          This is an automated notification. Please do not reply to this email.

        accepted:
            title:   Order Accepted
            status:  ACCEPTED
            message: Your order has been accepted and is being processed.
            details: We have received your order and begun processing it. We will notify you of further updates.

        assigned:
            title:         Carrier Assigned
            status:        ASSIGNED
            message:       A carrier has been assigned to your order.
            carrier_info:  Carrier Information
            carrier_name:  Name
            carrier_phone: Phone
            details:       Your order has been assigned to a carrier. They will contact you shortly to coordinate pickup.

        pickup_done:
            title:           Pickup Completed
            status:          PICKUP DONE
            message:         Your order has been picked up by the carrier.
            details:         The carrier has picked up your cargo and it is now in transit to the destination.
            in_transit_note: Your order is currently in transit to the delivery address.

        delivered:
            title:     Order Delivered
            status:    DELIVERED
            message:   Your order has been successfully delivered!
            details:   Your cargo has been delivered to the destination address. We hope you are satisfied with our service.
            thank_you: Thank you for using our service!

